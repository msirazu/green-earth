<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-100">
<header id="header">

</header>
<main id="main" class="w-11/12 mx-auto lg:w-10/12">
    <div id="main-container" class="grid grid-cols-12 h-[100vh] gap-5 py-10">

        <section id="left-sidebar" class="bg-white col-span-3 p-5 lg:col-span-2 shadow-lg">

            <h3 class="capitalize font-bold text-xl text-center">categories</h3>

            <div id="category-container" class="m-5 space-y-5">
                <button id="all-trees-btn" class="btn btn-outline w-full capitalize">all trees</button>
            </div>
        
        </section>

        <section id="main-content" class="col-span-6 lg:col-span-8 bg-white p-5 space-y-5 shadow-lg">

            <h2 class="capitalize text-center font-bold text-4xl text-[#4ADD7F]">choose your trees</h2>

            <div id="all-tree-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">

            </div>
        </section>

        <section id="right-sidebar" class="col-span-3 lg:col-span-2 bg-white p-5 space-y-5 shadow-lg">

            <h3 class="capitalize font-bold text-xl text-center">cart</h3>

            <div id="cart-des" class="space-y-5">
                <div id="cart-info" class="space-y-10"></div>
                <div id="no-cart-msg">
                    <p class="text-center">Your cart is empty<br/>Add trees to get started</p>
                </div>
                
                <div>
                    <p class="bg-green-100 p-4 text-center font-bold text-xl">Total: $<span class="total-cart-price">0</span></p>
                </div>
            </div>

        </section>

    </div>
</main>
<footer id="footer">

</footer>
    <script src="./scripts/main.js"></script>
</body>
</html>
